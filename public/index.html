<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VTNET — Minigame</title>
    <link rel="stylesheet" href="css/style.css" />
    <style>
      .home-hero h1 {
        font-size: clamp(2.5rem, 8vw, 5rem);
        color: #ee0000;
      }
      .login-card {
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 18px;
        padding: 32px 28px;
        width: 100%;
        max-width: 420px;
        display: flex;
        flex-direction: column;
        gap: 18px;
      }
      .emp-confirm {
        background: rgba(38, 137, 12, 0.15);
        border: 1px solid #26890c;
        border-radius: 10px;
        padding: 12px 16px;
        font-size: 0.92rem;
        color: #c8ffc0;
        display: none;
      }
      .emp-confirm.error {
        background: rgba(226, 27, 60, 0.15);
        border-color: #e21b3c;
        color: #ffb3b3;
      }
    </style>
  </head>
  <body>
    <nav class="navbar">
      <div class="logo">
        <img
          data-cfg="logo"
          src="images/Viettel Networks-white.png"
          alt="Viettel Network"
          class="logo-img"
        />
      </div>
    </nav>

    <!-- ═══════════════════════════════════════════ -->
    <!--  SCREEN 1: ĐĂNG NHẬP                        -->
    <!-- ═══════════════════════════════════════════ -->
    <main id="screen-login" class="screen home-hero">
      <div style="font-size: 3.2rem" data-cfg="event">💕Minigame💕</div>
      <h1 data-cfg="org">Viettel Network</h1>
      <p class="tagline" data-cfg="slogan">Slogan</p>

      <div class="login-card">
        <div style="text-align: center">
          <div style="font-size: 2rem; margin-bottom: 6px">🔐</div>
          <h3 style="margin: 0">Đăng nhập bằng mã nhân viên</h3>
          <p style="opacity: 0.6; font-size: 0.88rem; margin: 6px 0 0">
            Nhập MSNV của bạn để tiếp tục
          </p>
        </div>

        <input
          id="input-login-msnv"
          type="text"
          class="input"
          placeholder="Mã số nhân viên"
          maxlength="20"
          style="
            text-align: center;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 3px;
          "
          autocomplete="off"
        />

        <div id="login-emp-info" class="emp-confirm"></div>

        <div
          id="login-error"
          style="
            color: #ff6b6b;
            text-align: center;
            font-weight: 600;
            display: none;
          "
        ></div>

        <button class="btn btn-primary btn-lg btn-block" onclick="doLogin()">
          Xác nhận →
        </button>
      </div>

      <p
        style="opacity: 0.4; font-size: 0.82rem; margin-top: 12px"
        data-cfg="subtext"
      ></p>
    </main>

    <!-- ═══════════════════════════════════════════ -->
    <!--  SCREEN 2: MENU CHÍNH (sau đăng nhập)       -->
    <!-- ═══════════════════════════════════════════ -->
    <main id="screen-menu" class="screen home-hero hidden">
      <div style="font-size: 3.2rem" data-cfg="event">💕Minigame💕</div>
      <h1 data-cfg="org">Viettel Network</h1>
      <p class="tagline" data-cfg="slogan">Slogan</p>

      <div
        id="user-greeting"
        style="
          background: rgba(255, 255, 255, 0.1);
          border: 1px solid rgba(255, 255, 255, 0.2);
          border-radius: 999px;
          padding: 8px 22px;
          font-size: 0.95rem;
          font-weight: 600;
        "
      >
        👋 Xin chào!
      </div>

      <div class="home-actions" id="menu-actions">
        <!-- Được điền bởi JS theo quyền -->
      </div>

      <p
        style="opacity: 0.4; font-size: 0.82rem; margin-top: 8px"
        data-cfg="subtext"
      ></p>

      <button
        onclick="doLogout()"
        style="
          background: none;
          border: none;
          color: rgba(255, 255, 255, 0.35);
          font-size: 0.78rem;
          cursor: pointer;
          margin-top: 12px;
          text-decoration: underline;
        "
      >
        Đăng xuất
      </button>
    </main>

    <script src="js/config.js"></script>
    <script>
      applyAppConfig();

      const STORAGE_KEY = "vn_employee";
      let _countdownInterval = null;

      // Kiểm tra đã đăng nhập chưa (giữ login qua F5)
      (function checkExistingSession() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (!saved) return;
        try {
          const emp = JSON.parse(saved);
          if (emp && emp.msnv) showMenu(emp);
        } catch {
          localStorage.removeItem(STORAGE_KEY);
        }
      })();

      function doLogout() {
        clearInterval(_countdownInterval);
        localStorage.removeItem(STORAGE_KEY);
        document.getElementById("screen-menu").classList.add("hidden");
        document.getElementById("screen-login").classList.remove("hidden");
        document.getElementById("input-login-msnv").value = "";
      }

      const loginInput = document.getElementById("input-login-msnv");
      loginInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") doLogin();
      });

      async function doLogin() {
        const msnv = loginInput.value.trim().toUpperCase();
        const errEl = document.getElementById("login-error");
        const infoEl = document.getElementById("login-emp-info");
        errEl.style.display = "none";
        infoEl.style.display = "none";

        if (!msnv) {
          showLoginError("Vui lòng nhập mã số nhân viên!");
          return;
        }

        try {
          const res = await fetch(
            `/api/check-role/${encodeURIComponent(msnv)}`,
          );
          if (!res.ok) {
            const data = await res.json().catch(() => ({}));
            showLoginError(data.error || "Mã số nhân viên không hợp lệ!");
            infoEl.className = "emp-confirm error";
            infoEl.textContent =
              "⚠ Không tìm thấy mã số nhân viên này trong hệ thống";
            infoEl.style.display = "block";
            return;
          }
          const emp = await res.json();
          localStorage.setItem(STORAGE_KEY, JSON.stringify(emp));
          showMenu(emp);
        } catch {
          showLoginError("Không thể kết nối máy chủ. Thử lại!");
        }
      }

      function showLoginError(msg) {
        const el = document.getElementById("login-error");
        el.textContent = msg;
        el.style.display = "block";
      }

      function showMenu(emp) {
        // Cập nhật lời chào
        const greeting = document.getElementById("user-greeting");
        greeting.textContent = `👋 Xin chào, ${emp.hoTen || emp.msnv}${emp.phongBan ? " — " + emp.phongBan : ""}`;

        // Chuyển màn hình
        document.getElementById("screen-login").classList.add("hidden");
        document.getElementById("screen-menu").classList.remove("hidden");

        renderMenuActions(emp);
      }

      function renderMenuActions(emp) {
        clearInterval(_countdownInterval);
        const actions = document.getElementById("menu-actions");

        // Luôn đọc lại config mới nhất (bao gồm host đã lưu)
        const cfg = getEffectiveConfig();
        const startTime = cfg.eventStartTime ? new Date(cfg.eventStartTime) : null;

        if (startTime && Date.now() < startTime.getTime()) {
          // Chưa đến giờ — hiện đếm ngược
          actions.innerHTML = `
            <p style="opacity:0.75;font-size:1rem;margin:0;text-align:center">⏳ Chưa đến thời gian diễn ra chương trình</p>
            <div style="display:flex;gap:16px;justify-content:center;flex-wrap:wrap;
              background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.18);
              border-radius:16px;padding:20px 28px;">
              <div style="text-align:center;min-width:56px">
                <div id="cd-days" style="font-size:2.4rem;font-weight:800;line-height:1">--</div>
                <div style="font-size:0.72rem;opacity:0.6;margin-top:4px">Ngày</div>
              </div>
              <div style="font-size:2rem;font-weight:300;opacity:0.4;align-self:center">:</div>
              <div style="text-align:center;min-width:56px">
                <div id="cd-hours" style="font-size:2.4rem;font-weight:800;line-height:1">--</div>
                <div style="font-size:0.72rem;opacity:0.6;margin-top:4px">Giờ</div>
              </div>
              <div style="font-size:2rem;font-weight:300;opacity:0.4;align-self:center">:</div>
              <div style="text-align:center;min-width:56px">
                <div id="cd-minutes" style="font-size:2.4rem;font-weight:800;line-height:1">--</div>
                <div style="font-size:0.72rem;opacity:0.6;margin-top:4px">Phút</div>
              </div>
              <div style="font-size:2rem;font-weight:300;opacity:0.4;align-self:center">:</div>
              <div style="text-align:center;min-width:56px">
                <div id="cd-seconds" style="font-size:2.4rem;font-weight:800;line-height:1">--</div>
                <div style="font-size:0.72rem;opacity:0.6;margin-top:4px">Giây</div>
              </div>
            </div>
            ${emp.isAdmin ? `<a href="host.html" class="btn btn-primary btn-lg">🎮 Host Game</a>` : ""}`;

          function tick() {
            // Đọc lại startTime mỗi tick để phản ánh khi host thay đổi
            const latestStart = new Date(getEffectiveConfig().eventStartTime);
            const diff = latestStart.getTime() - Date.now();
            if (diff <= 0) {
              clearInterval(_countdownInterval);
              renderMenuActions(emp);
              return;
            }
            const d = Math.floor(diff / 86400000);
            const h = Math.floor((diff % 86400000) / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            document.getElementById("cd-days").textContent    = String(d).padStart(2, "0");
            document.getElementById("cd-hours").textContent   = String(h).padStart(2, "0");
            document.getElementById("cd-minutes").textContent = String(m).padStart(2, "0");
            document.getElementById("cd-seconds").textContent = String(s).padStart(2, "0");
          }

          tick();
          _countdownInterval = setInterval(tick, 1000);

        } else {
          // Đã đến giờ — hiện nút bình thường
          if (emp.isAdmin) {
            actions.innerHTML = `
              <a href="host.html" class="btn btn-primary btn-lg">🎮 Host Game</a>
              <a href="play.html" class="btn btn-ghost-dark btn-lg">▶ Tham gia chơi</a>`;
          } else {
            actions.innerHTML = `
              <a href="play.html" class="btn btn-primary btn-lg">▶ Tham gia chơi</a>`;
          }
        }
      }

      // Khi host thay đổi config từ tab khác → re-render ngay
      window.addEventListener("storage", (e) => {
        if (e.key !== "vn_event_config") return;
        const menuScreen = document.getElementById("screen-menu");
        if (menuScreen.classList.contains("hidden")) return;
        const saved = localStorage.getItem("vn_employee");
        if (!saved) return;
        try {
          const emp = JSON.parse(saved);
          applyAppConfig();       // cập nhật tên/slogan trên trang
          renderMenuActions(emp); // cập nhật countdown / nút
        } catch {}
      });
    </script>
  </body>
</html>
